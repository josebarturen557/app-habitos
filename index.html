<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hábitos RPG — José</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0d1a;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: #111827;
      border-radius: 16px;
      border: 0.5px solid #1e2d4a;
    }

    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,212,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #00d4ff;
      border: 2px solid rgba(0,212,255,0.4);
    }

    .user-name { font-size: 15px; font-weight: 600; }
    .user-level { font-size: 11px; color: #6b7a99; margin-top: 2px; }
    .date-badge {
      font-size: 11px; font-family: monospace;
      color: #00d4ff; background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      padding: 4px 10px; border-radius: 20px;
    }

    .xp-card {
      background: #111827; border: 0.5px solid #1e2d4a;
      border-radius: 14px; padding: 14px 16px;
    }

    .xp-top { display: flex; justify-content: space-between; font-size: 12px; color: #6b7a99; margin-bottom: 8px; }
    .xp-bar { height: 8px; background: #1e2d4a; border-radius: 99px; overflow: hidden; }
    .xp-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff9d); border-radius: 99px; transition: width 0.5s ease; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .stat-card {
      background: #111827; border: 0.5px solid #1e2d4a;
      border-radius: 12px; padding: 12px 8px; text-align: center;
    }

    .stat-val { font-size: 24px; font-weight: 700; }
    .stat-val.pts { color: #00d4ff; }
    .stat-val.streak { color: #ff6b35; }
    .stat-val.today { color: #00ff9d; }
    .stat-lbl { font-size: 10px; color: #6b7a99; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    .section-title {
      font-size: 11px; font-weight: 600; color: #6b7a99;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .habits-list { display: flex; flex-direction: column; gap: 10px; }

    .habit-card {
      background: #111827; border: 0.5px solid #1e2d4a;
      border-radius: 16px; padding: 14px;
      cursor: pointer; transition: border-color 0.2s, transform 0.1s;
      user-select: none;
    }

    .habit-card:active { transform: scale(0.98); }
    .habit-card.done-today { border-color: rgba(0,255,157,0.3); }

    .habit-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

    .habit-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .habit-info { flex: 1; }
    .habit-name { font-size: 14px; font-weight: 600; }
    .habit-sub { font-size: 11px; color: #6b7a99; margin-top: 2px; }

    .check-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid #2d3f5e;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer;
      transition: all 0.2s; color: transparent; flex-shrink: 0;
    }

    .done-today .check-btn {
      background: rgba(0,255,157,0.15);
      border-color: #00ff9d;
      color: #00ff9d;
    }

    .calendar-row { display: flex; gap: 3px; }

    .cal-day {
      flex: 1; aspect-ratio: 1;
      border-radius: 5px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; font-size: 9px;
      color: #6b7a99;
      background: #0f1525;
      border: 0.5px solid #1e2d4a;
      max-width: 34px;
    }

    .cal-day.completed { color: rgba(255,255,255,0.9); }
    .cal-day.today-cal { border-color: #4a6fa5; border-width: 1.5px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: #1e2d4a; }
    .cal-day.completed .cal-dot { background: rgba(255,255,255,0.6); }

    .badges-card {
      background: #111827; border: 0.5px solid #1e2d4a;
      border-radius: 14px; padding: 14px 16px;
    }

    .badges-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

    .badge-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #6b7a99; }

    .badge-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; border: 1.5px solid #1e2d4a;
      background: #0f1525;
    }

    .badge-icon.unlocked { border-color: #c9a84c; background: rgba(201,168,76,0.1); }
    .badge-icon.locked { opacity: 0.25; filter: grayscale(1); }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2235; border: 0.5px solid #2d3f5e;
      border-radius: 14px; padding: 10px 20px;
      font-size: 13px; font-weight: 600; color: #eef2ff;
      transition: transform 0.3s ease;
      white-space: nowrap; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      text-align: center; font-size: 10px; color: #2d3f5e;
      font-family: monospace; padding: 8px 0;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="avatar">J</div>
      <div>
        <div class="user-name">José</div>
        <div class="user-level" id="level-label">Nivel 1 — Novato</div>
      </div>
    </div>
    <div class="date-badge" id="date-label"></div>
  </div>

  <div class="xp-card">
    <div class="xp-top">
      <span>Experiencia</span>
      <span id="xp-label">0 / 100 XP</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val pts" id="stat-pts">0</div><div class="stat-lbl">Puntos</div></div>
    <div class="stat-card"><div class="stat-val streak" id="stat-streak">0d</div><div class="stat-lbl">Mejor racha</div></div>
    <div class="stat-card"><div class="stat-val today" id="stat-today">0/6</div><div class="stat-lbl">Hoy</div></div>
  </div>

  <div class="section-title">Hábitos de hoy</div>
  <div class="habits-list" id="habits-list"></div>

  <div class="badges-card">
    <div class="section-title">Logros</div>
    <div class="badges-row" id="badges-row"></div>
  </div>

  <footer>Hábitos RPG · José · v1.0</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const HABITS = [
  { id:'chess',    name:'Ajedrez',      sub:'Puzzle o apertura del día',   icon:'♟', color:'#B7950B', bg:'rgba(183,149,11,0.15)', xp:80,  pts:50  },
  { id:'study',    name:'Estudio',      sub:'Estudia o practica algo',     icon:'📚', color:'#1565C0', bg:'rgba(21,101,192,0.15)', xp:100, pts:60  },
  { id:'exercise', name:'Ejercicio',    sub:'30 min de actividad física',  icon:'💪', color:'#B71C1C', bg:'rgba(183,28,28,0.15)',  xp:90,  pts:55  },
  { id:'food',     name:'Alimentación', sub:'Come saludable hoy',          icon:'🥗', color:'#1B5E20', bg:'rgba(27,94,32,0.15)',   xp:70,  pts:45  },
  { id:'order',    name:'Orden',        sub:'Ordena tu espacio',           icon:'🧹', color:'#6A1B9A', bg:'rgba(106,27,154,0.15)', xp:60,  pts:40  },
  { id:'vitalidad', name:'Vitalidad',  sub:'',                            icon:'🔥', color:'#E65100', bg:'rgba(230,81,0,0.15)',   xp:85,  pts:52  },
];

const LEVELS = [
  {name:'Novato',xp:0},{name:'Aprendiz',xp:100},{name:'Practicante',xp:300},
  {name:'Avanzado',xp:600},{name:'Experto',xp:1000},{name:'Maestro',xp:1500}
];

const BADGES = [
  {id:'first',   icon:'⭐', label:'Primera vez',  check: s => s.totalPts >= 1},
  {id:'streak3', icon:'🔥', label:'Racha 3 días', check: s => s.bestStreak >= 3},
  {id:'streak7', icon:'🏆', label:'Racha 7 días', check: s => s.bestStreak >= 7},
  {id:'perfect', icon:'💎', label:'Día perfecto', check: s => s.perfectDays >= 1},
];

function todayStr() { return new Date().toISOString().slice(0,10); }

function loadState() {
  try { const r = localStorage.getItem('habitos_v2'); if (r) return JSON.parse(r); } catch(e) {}
  return { history:{}, totalPts:0, totalXP:0, bestStreak:0, perfectDays:0 };
}

function saveState(s) { try { localStorage.setItem('habitos_v2', JSON.stringify(s)); } catch(e) {} }

let STATE = loadState();

function getStreak(hid) {
  let streak = 0, d = new Date();
  while (true) {
    const key = d.toISOString().slice(0,10);
    if (STATE.history[key] && STATE.history[key][hid]) { streak++; d.setDate(d.getDate()-1); }
    else break;
    if (streak > 365) break;
  }
  return streak;
}

function getBestStreak() {
  let best = 0;
  HABITS.forEach(h => { best = Math.max(best, getStreak(h.id)); });
  return best;
}

function getLast14() {
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

function getLevel(xp) {
  let lvl = 0;
  for (let i = 0; i < LEVELS.length; i++) { if (xp >= LEVELS[i].xp) lvl = i; }
  return lvl;
}

function getNextXP(lvl) { return LEVELS[lvl+1] ? LEVELS[lvl+1].xp : LEVELS[lvl].xp+500; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggle(hid) {
  const today = todayStr();
  if (!STATE.history[today]) STATE.history[today] = {};
  const h = HABITS.find(x => x.id === hid);
  if (STATE.history[today][hid]) {
    STATE.history[today][hid] = false;
    STATE.totalPts -= h.pts;
    STATE.totalXP -= h.xp;
    showToast('Hábito desmarcado');
  } else {
    STATE.history[today][hid] = true;
    STATE.totalPts += h.pts;
    STATE.totalXP += h.xp;
    const doneHoy = HABITS.filter(x => STATE.history[today][x.id]).length;
    if (doneHoy === 6) {
      STATE.perfectDays = (STATE.perfectDays||0) + 1;
      STATE.totalPts += 100; STATE.totalXP += 150;
      showToast('¡Día perfecto! +150 XP bonus 💎');
    } else {
      showToast(`+${h.pts} puntos · +${h.xp} XP`);
    }
  }
  STATE.bestStreak = getBestStreak();
  saveState(STATE);
  render();
}

function render() {
  const today = todayStr();
  const todayData = STATE.history[today] || {};
  const doneHoy = HABITS.filter(h => todayData[h.id]).length;
  const lvl = getLevel(STATE.totalXP);
  const nextXP = getNextXP(lvl);
  const prevXP = LEVELS[lvl].xp;
  const pct = Math.round(((STATE.totalXP - prevXP) / (nextXP - prevXP)) * 100);
  const days14 = getLast14();

  document.getElementById('date-label').textContent = new Date().toLocaleDateString('es-PE', {weekday:'short', day:'2-digit', month:'short'});
  document.getElementById('level-label').textContent = `Nivel ${lvl+1} — ${LEVELS[lvl].name}`;
  document.getElementById('xp-label').textContent = `${STATE.totalXP} / ${nextXP} XP`;
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('stat-pts').textContent = STATE.totalPts;
  document.getElementById('stat-streak').textContent = STATE.bestStreak + 'd';
  document.getElementById('stat-today').textContent = `${doneHoy}/6`;

  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  HABITS.forEach(h => {
    const done = !!todayData[h.id];
    const streak = getStreak(h.id);
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done-today' : '');

    const calHTML = days14.map(d => {
      const isToday = d === today;
      const completed = STATE.history[d] && STATE.history[d][h.id];
      const dayNum = parseInt(d.slice(8,10));
      return `<div class="cal-day${completed?' completed':''}${isToday?' today-cal':''}" style="${completed?`background:${h.color};border-color:${h.color};`:''}">
        <span>${dayNum}</span>
        <div class="cal-dot"></div>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="habit-top">
        <div class="habit-icon" style="background:${h.bg};">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-sub">${streak > 0 ? `🔥 ${streak} día${streak>1?'s':''} seguido${streak>1?'s':''}` : h.sub}</div>
        </div>
        <div class="check-btn">${done ? '✓' : ''}</div>
      </div>
      <div class="calendar-row">${calHTML}</div>
    `;
    card.addEventListener('click', () => toggle(h.id));
    list.appendChild(card);
  });

  const br = document.getElementById('badges-row');
  br.innerHTML = '';
  BADGES.forEach(b => {
    const unlocked = b.check(STATE);
    const el = document.createElement('div');
    el.className = 'badge-item';
    el.innerHTML = `<div class="badge-icon ${unlocked?'unlocked':'locked'}">${b.icon}</div><span>${b.label}</span>`;
    br.appendChild(el);
  });
}

render();
</script>
</body>
</html>
